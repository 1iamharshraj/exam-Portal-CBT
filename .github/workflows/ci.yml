name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-typecheck-build:
    name: Lint, Type Check & Build
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build shared package
        run: npm run build -w @exam-portal/shared

      - name: Type check frontend
        run: npx tsc --noEmit -p packages/frontend/tsconfig.json

      - name: Type check backend
        run: npx tsc --noEmit -p packages/backend/tsconfig.json

      - name: Build frontend
        run: npm run build -w @exam-portal/frontend

      - name: Build backend
        run: npm run build -w @exam-portal/backend
